services:
  fiesta-db:
    image: postgres:latest
    container_name: expert-fiesta-postgres
    restart: always
    environment:
      POSTGRES_USER: fiesta_admin
      POSTGRES_PASSWORD: fiesta_admin_password
      POSTGRES_DB: expert_fiesta
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: fiesta-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
  grafana:
    image: grafana/grafana:latest
    container_name: fiesta-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - fiesta-db